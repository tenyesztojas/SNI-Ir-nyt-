<svg xmlns="http://www.w3.org/2000/svg" width="1448" height="1086" viewBox="0 0 1448 1086" role="img" aria-labelledby="bh-title bh-desc">
<title id="bh-title">BiztosHely logó</title>
<desc id="bh-desc">BiztosHely logó, két védelmező figura ölel körbe egy házat és iránytűt. Mottó: itt biztonságban vagy.</desc>
<defs>
  <linearGradient id="tealGrad" x1="770" y1="160" x2="1030" y2="720" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#19C8C2"/>
    <stop offset="1" stop-color="#11B5B0"/>
  </linearGradient>
  <linearGradient id="needleGrad" x1="698" y1="495" x2="754" y2="690" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#14C2BF"/>
    <stop offset="0.48" stop-color="#12BDBC"/>
    <stop offset="0.50" stop-color="#0C77BF"/>
    <stop offset="1" stop-color="#0058AA"/>
  </linearGradient>
  <linearGradient id="textGrad" x1="840" y1="780" x2="1105" y2="900" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#16C3C1"/>
    <stop offset="1" stop-color="#19D4C0"/>
  </linearGradient>
</defs>

<!-- Logo mark -->
<g id="mark">
  <!-- heads -->
  <circle cx="597" cy="217" r="45" fill="#006FBE"/>
  <circle cx="851" cy="217" r="45" fill="url(#tealGrad)"/>

  <!-- embracing figures / heart-like shield -->
  <path d="M650 308
           C562 295 482 354 464 453
           C446 551 500 658 604 746
           C644 780 683 806 724 837
           C704 770 694 690 688 611
           C682 515 675 410 650 308 Z"
        fill="#006FBE"/>

  <path d="M798 308
           C886 295 966 354 984 453
           C1002 551 948 658 844 746
           C804 780 765 806 724 837
           C744 770 754 690 760 611
           C766 515 773 410 798 308 Z"
        fill="url(#tealGrad)"/>

  <!-- inner arm curves -->
  <path d="M607 328 C645 327 680 346 709 382" fill="none" stroke="#006FBE" stroke-width="26" stroke-linecap="round"/>
  <path d="M841 328 C803 327 768 346 739 382" fill="none" stroke="url(#tealGrad)" stroke-width="26" stroke-linecap="round"/>

  <!-- roof -->
  <path d="M566 423 L724 296 L882 423" fill="none" stroke="#16C3C1" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- house side walls -->
  <path d="M587 446 L587 545" fill="none" stroke="#006FBE" stroke-width="18" stroke-linecap="round"/>
  <path d="M861 446 L861 545" fill="none" stroke="#006FBE" stroke-width="18" stroke-linecap="round"/>

  <!-- window -->
  <rect x="699" y="405" width="22" height="22" rx="2" fill="#006FBE"/>
  <rect x="727" y="405" width="22" height="22" rx="2" fill="#006FBE"/>
  <rect x="699" y="433" width="22" height="22" rx="2" fill="#006FBE"/>
  <rect x="727" y="433" width="22" height="22" rx="2" fill="#006FBE"/>

  <!-- compass needle -->
  <path d="M724 486 L757 661 L724 706 L691 661 Z" fill="url(#needleGrad)"/>
  <circle cx="724" cy="626" r="22" fill="#ffffff"/>
  <circle cx="724" cy="626" r="10" fill="#1B67B6"/>
</g>

<!-- Wordmark -->
<g id="wordmark" font-family="'DejaVu Sans', 'Arial', sans-serif">
  <text x="270" y="875" font-weight="800" font-size="150" fill="#0060B6">Biztos</text>
  <text x="815" y="875" font-weight="800" font-size="150" fill="url(#textGrad)">Hely</text>
  <text x="412" y="966" font-weight="500" font-size="60" fill="#005FAF">itt biztonságban vagy</text>
</g>
</svg>
